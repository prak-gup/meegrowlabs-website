  html,body{margin:0;height:100%}
  body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:linear-gradient(135deg,#0b3d91,#1f6feb);color:var(--ink);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}

  input[type=password]:focus{border-color:var(--blue)}
  button{padding:13px 14px;font-size:15px;font-weight:600;color:#fff;background:var(--brand);border:none;border-radius:10px;cursor:pointer;transition:background .15s}

  button:disabled{opacity:.6;cursor:default}
  .err{color:var(--red);font-size:13.5px;font-weight:500;min-height:18px;margin-top:2px}

  const b64d = (s) => Uint8Array.from(atob(s), c => c.charCodeAt(0));
  const form = document.getElementById('f');
  const pwEl = document.getElementById('pw');
  const errEl = document.getElementById('err');
  const btn = document.getElementById('btn');

  async function unlock(password) {
    const enc = new TextEncoder();
    const baseKey = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
    const key = await crypto.subtle.deriveKey(
      { name: 'PBKDF2', salt: b64d(PAYLOAD.salt), iterations: PAYLOAD.iterations, hash: 'SHA-256' },
      baseKey,
      { name: 'AES-GCM', length: 256 },
      false,
      ['decrypt']
    );
    const ptBuf = await crypto.subtle.decrypt(
      { name: 'AES-GCM', iv: b64d(PAYLOAD.iv) },
      key,
      b64d(PAYLOAD.ct)
    );
    return new TextDecoder().decode(ptBuf);
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    errEl.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Unlocking…';
    try {
      const html = await unlock(pwEl.value);
      try { sessionStorage.setItem('ml_ac', pwEl.value); } catch (_) {}
      document.open();
      document.write(html);
      document.close();
    } catch (err) {
      errEl.textContent = 'Incorrect access code. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Unlock';
      pwEl.value = '';
      pwEl.focus();
    }
  });

  // Session-shared unlock: if a sibling Meegrow share was already unlocked in
  // this browser session with the same code, reveal automatically (no re-prompt).
  // A mismatching remembered code simply fails and the gate is shown as normal.
  (async function () {
    let stored = null;
    try { stored = sessionStorage.getItem('ml_ac'); } catch (_) {}
    if (!stored) return;
    try {
      const html = await unlock(stored);
      document.open();
      document.write(html);
      document.close();
    } catch (_) { /* remembered code doesn't match this document — show the gate */ }
  })();
</script>
